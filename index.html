<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCalc | The Future of Math</title>
    <meta name="description" content="A stunning, vibecoded calculator app with premium design.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card" id="calculator">
        <div class="display-container">
            <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand">0</div>
        </div>
        <div class="buttons-grid">
            <button data-all-clear class="span-two secondary">AC</button>
            <button data-delete class="secondary">DEL</button>
            <button data-operation class="secondary">÷</button>
            <button data-number>7</button>
            <button data-number>8</button>
            <button data-number>9</button>
            <button data-operation class="secondary">×</button>
            <button data-number>4</button>
            <button data-number>5</button>
            <button data-number>6</button>
            <button data-operation class="secondary">+</button>
            <button data-number>1</button>
            <button data-number>2</button>
            <button data-number>3</button>
            <button data-operation class="secondary">-</button>
            <button data-number>.</button>
            <button data-number>0</button>
            <button data-equals class="span-two accent">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
